name: mizania
description: "تطبيق ميزانية لإدارة المال الشخصي"
publish_to: 'none'
version: 2.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.1
  intl: ^0.18.1
  fl_chart: ^0.63.0
  image_picker: ^1.1.2
  mobile_scanner: ^3.5.6
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  collection: ^1.18.0
  share_plus: ^7.2.2
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  pdf: ^3.11.1
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.21
